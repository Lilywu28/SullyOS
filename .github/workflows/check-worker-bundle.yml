name: Check Worker Bundle

on:
  pull_request:
    paths:
      - 'worker/instant-push/src/**'
      - 'utils/sanitize.ts'
      - 'scripts/build-workers.mjs'
      - 'worker/instant-push/worker.bundle.js'
      - 'public/instant-worker.bundle.js'
      - 'worker/instant-push/package.json'
      - 'worker/instant-push/wrangler.toml'
      - 'pnpm-lock.yaml'
  push:
    branches: [main, master, dev]

jobs:
  check-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild worker bundles
        run: pnpm build:workers

      # `wrangler.toml` 里 main 指向的就是 worker.bundle.js, 部署直接上传它.
      # src/ 改了忘 rebuild → 这一步会有 diff → 下面 git diff --exit-code 把 PR 拦下来.
      # 详见 CLAUDE.md 的 "改 Worker 源码后必须重新打包 bundle" 章节.
      - name: Fail if bundle drifted from source
        run: |
          if ! git diff --exit-code -- worker/instant-push/worker.bundle.js public/instant-worker.bundle.js; then
            echo ""
            echo "::error::worker bundle 跟源码不同步. 本地跑 'pnpm build:workers' 后把 bundle 一起 commit. 详见 CLAUDE.md."
            exit 1
          fi
